name: Build and Test ESP-IDF Applications

on: [push, pull_request]

env:
  APP_PATH: button-ex

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [esp32, esp32c3]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Empty .env
        run: touch .env

      - name: Build in Dev Container
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: |
            idf-ci build run -p "${APP_PATH}" --target ${{ matrix.target }}

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp-binaries-${{ matrix.target }}
          path: ${{ env.APP_PATH }}/build_${{ matrix.target }}_*
          if-no-files-found: error

      - name: Run Pytest in Dev Container
        uses: devcontainers/ci@v0.3
        with:
          push: never
          env: |
            WOKWI_CLI_TOKEN=${{ secrets.WOKWI_CLI_TOKEN }}
          runCmd: |
            if [ -z "${WOKWI_CLI_TOKEN:-}" ]; then
              echo "WOKWI_CLI_TOKEN is not set. Configure it in repository secrets."
              exit 1
            fi
            python -m pytest button-ex/test_button_ex.py \
              --target ${{ matrix.target }} \
              --wokwi-diagram "${APP_PATH}/diagram.${{ matrix.target }}.json" \
              --embedded-services idf,wokwi \
              --junitxml="report_${{ matrix.target }}.xml"

      - name: Upload Pytest JUnit Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.target }}
          path: report_${{ matrix.target }}.xml
